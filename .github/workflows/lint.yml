name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Node syntax check
        run: |
          node --check statusline.js
          node --check subagent-statusline.js
          node --check codex-quota-refresh.js
          node --check scripts/notify-hook.js
          node --check scripts/dlc-ledger.js
          node --check scripts/dlc-task-router.js
          node --check scripts/dlc-evidence-ledger.js
          node --check scripts/dlc-early-stop.js
          node --check scripts/dlc-doc-drift.js
          node --check scripts/dlc-doc-drift.test.js
          node --check scripts/dlc-signal.js
          node --check scripts/dlc-signal.test.js
          node --check scripts/dlc-evidence-ledger.test.js
          node --check scripts/guard-worktree-edit.js
          node --check scripts/guard-worktree-edit.test.js
          node --check scripts/session-brief.js
          node --check scripts/session-brief.test.js
          node --check scripts/usage-count.js
          node --check scripts/usage-count.test.js

      - name: Unit tests
        run: |
          node scripts/dlc-doc-drift.test.js
          node scripts/dlc-signal.test.js
          node scripts/dlc-evidence-ledger.test.js
          node scripts/guard-worktree-edit.test.js
          node scripts/session-brief.test.js
          node scripts/usage-count.test.js

      - name: JSON validation
        run: |
          node -e "JSON.parse(require('fs').readFileSync('settings.json','utf8'))"

      - name: Shell script lint (shellcheck)
        run: shellcheck scripts/*.sh skills/e/*.sh skills/improve/*.sh
